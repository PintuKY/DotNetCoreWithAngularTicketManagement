<!-- ======= Chapter List Section ======= -->
<section id="chapter-section" class="chapter-section">
  <div class="chapter-container" data-aos="fade-up">
    <div class="chapter-title">
      <h2>All Chapters</h2>
      <p>Choose a chapter to continue your preparation with smart practice tests and guided study resources.</p>
    </div>

    <div class="chapter-grid">
      <div *ngFor="let opt of chapters; let i = index" class="chapter-card" [attr.data-aos]="'zoom-in'" [attr.data-aos-delay]="(i * 80) + 100">
        <div class="chapter-card-top">
          <span class="chapter-badge">Chapter {{ i + 1 }}</span>
          <div class="chapter-icon">
            <i class="bx bx-book-reader"></i>
          </div>
        </div>

        <div class="chapter-card-body">
          <h4>
            <a [routerLink]="['/question']" [queryParams]="{ id: opt.chapterGuid, SyID: syllabusID }" class="chapter-link">
              {{ opt.chapterName }}
            </a>
          </h4>
          <p class="chapter-desc">Tap to view questions for this chapter and start your exam practice.</p>
        </div>

        <div class="chapter-card-footer">
          <a [routerLink]="['/question']" [queryParams]="{ id: opt.chapterGuid, SyID: syllabusID }" class="chapter-action">
            Start Now <i class="bx bx-right-arrow-alt"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- End Chapter List Section -->
