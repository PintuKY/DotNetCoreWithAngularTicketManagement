 <div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <form (ngSubmit)="submitLogin()">
      <p class="input-error" *ngIf="loginError">{{ loginError }}</p>
      <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>
      <div class="form-group">
        <input 
          type="email" 
          placeholder="Email" 
          class="input-field"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>
      <div class="form-group">
        <input 
          type="password" 
          placeholder="Password" 
          class="input-field"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>
      <button type="submit" class="login-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Logging in...' : 'Login' }}
      </button>
      <button type="button" class="signup-btn" [routerLink]="['/registration']">Sign Up</button>

      <div class="social-login-group">
        <button type="button" class="social-btn google-btn">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
              <path d="M21.35 11.1h-9.4v2.95h5.4c-.25 1.45-1.35 2.7-2.9 3.35v2.8h4.7c2.75-2.55 4.35-6.25 4.35-10.8 0-.8-.1-1.6-.25-2.35z" opacity=".75"/>
              <path d="M11.95 22c2.8 0 5.15-.9 6.85-2.45l-4.7-2.8c-1.3.85-2.95 1.35-4.15 1.35-3.2 0-5.9-2.15-6.85-5.05H.95v3.15C2.65 19.95 7 22 11.95 22z" opacity=".7"/>
              <path d="M5.1 13.15c-.3-.9-.45-1.85-.45-2.85s.15-1.95.45-2.85V4.3H.95A11.95 11.95 0 000 12.3c0 1.95.45 3.8 1.25 5.5l4.85-3.65z" opacity=".65"/>
              <path d="M11.95 4.4c1.55 0 2.95.55 4.05 1.6l3.05-3.05C17.1 1.05 14.75 0 11.95 0 7 0 2.65 2.05.95 5.3l4.15 3.05c.95-2.9 3.65-5.05 6.85-5.05z"/>
            </svg>
          </span>
          Continue with Google
        </button>
        <button type="button" class="social-btn linkedin-btn">
          <span class="social-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
              <path d="M4.98 3.5c0 1.38-1.12 2.5-2.5 2.5S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.25 22h4.5V7.5h-4.5V22zM8.75 7.5H13v2h.1c.62-1.15 2.14-2.35 4.4-2.35 4.7 0 5.55 3.1 5.55 7.15V22h-4.5v-6.55c0-1.56-.03-3.55-2.16-3.55-2.15 0-2.48 1.67-2.48 3.4V22h-4.5V7.5z"/>
            </svg>
          </span>
          Continue with LinkedIn
        </button>
      </div>

      <a href="#" class="forgot-password">Forgot Password?</a>
     <!-- <div class="new-signup">
      <label class="signup-level">If not have account please : </label>
       <a href="/registration" class="new-registration"> Sign Up </a>
     </div> -->
     <p class="registration-link">
        If not have account please?
        <a [routerLink]="['/registration']">Sign Up</a>
      </p>
    </form>
  </div>
</div>
